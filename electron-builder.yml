appId: com.ghostpane.app
productName: Ghostpane
directories:
  output: release
files:
  - out/**/*
  - package.json
mac:
  category: public.app-category.productivity
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  # Unsigned by default. To sign + notarize later, add:
  #   identity: "Developer ID Application: Your Name (TEAMID)"
  #   notarize: { teamId: "TEAMID" }
win:
  target:
    - nsis
