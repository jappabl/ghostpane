appId: com.ghostpane.app
productName: Ghostpane
directories:
  output: release
# Sign the packed app with our stable self-signed identity (see build/afterPack.cjs)
# so the Screen Recording grant survives updates. electron-builder skips untrusted
# identities itself, so signing happens in the hook.
afterPack: build/afterPack.cjs
files:
  - out/**/*
  - package.json
extraResources:
  - from: build/native/ghostpane-helper
    to: native/ghostpane-helper
mac:
  category: public.app-category.productivity
  extendInfo:
    NSMicrophoneUsageDescription: Ghostpane records microphone audio only while Command+Return is held.
    NSSpeechRecognitionUsageDescription: Ghostpane transcribes held audio locally to add context to your request.
    NSScreenCaptureUsageDescription: Ghostpane captures your screen and system audio only when you ask it to.
  target:
    - target: dmg
      arch:
        - arm64
        - x64
win:
  target:
    - nsis
